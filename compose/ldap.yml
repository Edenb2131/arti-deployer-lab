# Overlay: OpenLDAP (osixia image, same as the team's reference fixture).
# Base DN: dc=example,dc=org — matching ldapsetupforartifactory's newscript.sh.
services:
  openldap:
    image: osixia/openldap:${OPENLDAP_VERSION}
    container_name: arti-openldap
    restart: unless-stopped
    command: ["--copy-service"]
    environment:
      LDAP_ORGANISATION: "JFrog Lab"
      LDAP_DOMAIN: example.org
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_TLS: "false"
    ports:
      - "${LDAP_PORT}:389"
      - "${LDAP_TLS_PORT}:636"
    volumes:
      - openldap-data:/var/lib/ldap
      - openldap-config:/etc/ldap/slapd.d
      # Custom LDIFs applied at first bootstrap (rendered from .tmpl)
      - ../config/ldap/ldifs:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
    networks:
      arti-net:
        aliases: [openldap]
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -b dc=example,dc=org -D 'cn=admin,dc=example,dc=org' -w \"$$LDAP_ADMIN_PASSWORD\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  openldap-data:
    name: arti-deployer_openldap-data
  openldap-config:
    name: arti-deployer_openldap-config

networks:
  arti-net:
    name: arti-deployer_net
