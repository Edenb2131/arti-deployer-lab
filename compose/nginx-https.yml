# Overlay: NGINX reverse proxy with HTTPS (self-signed cert).
# Mutually exclusive with compose/nginx.yml — CLI picks one.
services:
  nginx:
    image: nginx:${NGINX_VERSION}
    container_name: arti-nginx
    restart: unless-stopped
    depends_on:
      artifactory1:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ../config/nginx/nginx-https.conf:/etc/nginx/nginx.conf:ro
      - ../config/nginx/certs:/etc/nginx/certs:ro
    networks: [arti-net]

networks:
  arti-net:
    name: arti-deployer_net
