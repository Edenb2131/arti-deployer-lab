# Base topology: one Artifactory instance + dedicated Postgres.
# Always included.
services:
  postgres-art1:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres-art1
    restart: unless-stopped
    environment:
      POSTGRES_USER: artifactory
      POSTGRES_PASSWORD: ${PG_AF1_PASSWORD}
      POSTGRES_DB: artifactory
    volumes:
      - postgres-art1-data:/var/lib/postgresql/data
    networks: [arti-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactory -d artifactory"]
      interval: 5s
      timeout: 5s
      retries: 30

  artifactory1:
    image: releases-docker.jfrog.io/jfrog/artifactory-pro:${AF_VERSION}
    container_name: artifactory1
    restart: unless-stopped
    depends_on:
      postgres-art1:
        condition: service_healthy
    user: "1030:1030"
    ulimits:
      nproc: 65535
      nofile:
        soft: 32000
        hard: 40000
    environment:
      EXTRA_JAVA_OPTIONS: "-Xms1g -Xmx4g"
      # Database config via env vars (JFrog's recommended pattern for
      # containerized deployments). A custom system.yaml at the wrong path
      # silently breaks the router service in 7.111 — env vars take effect
      # cleanly and match the official compose example.
      JF_SHARED_DATABASE_TYPE: postgresql
      JF_SHARED_DATABASE_DRIVER: org.postgresql.Driver
      JF_SHARED_DATABASE_URL: jdbc:postgresql://postgres-art1:5432/artifactory
      JF_SHARED_DATABASE_USERNAME: artifactory
      JF_SHARED_DATABASE_PASSWORD: ${PG_AF1_PASSWORD}
      JF_SHARED_NODE_ID: art1
      JF_SHARED_NODE_NAME: art1
    ports:
      - "${AF1_HTTP_PORT}:8081"
      - "${AF1_ROUTER_PORT}:8082"
    volumes:
      - artifactory1-data:/var/opt/jfrog/artifactory
      # Drop license in /artifactory_extra_conf/ — AF copies it into the
      # right place during first-boot bootstrap.
      - ../config/art1/artifactory.lic:/artifactory_extra_conf/artifactory.lic:ro
    networks:
      arti-net:
        aliases: [artifactory1]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/router/api/v1/system/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s

volumes:
  postgres-art1-data:
    name: arti-deployer_postgres-art1-data
  artifactory1-data:
    name: arti-deployer_artifactory1-data

networks:
  arti-net:
    name: arti-deployer_net
    driver: bridge
