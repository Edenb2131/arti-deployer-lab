# Overlay: Keycloak OIDC provider (dev mode, embedded H2).
# Realm and client are pre-imported from config/keycloak/realm.json.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: arti-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --hostname-strict-https=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ../config/keycloak/realm.json:/opt/keycloak/data/import/jfrog-realm.json:ro
      - keycloak-data:/opt/keycloak/data
    networks:
      arti-net:
        aliases: [keycloak]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\nHost: localhost\\nConnection: close\\n\\n' >&3 && grep -q UP <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  keycloak-data:
    name: arti-deployer_keycloak-data

networks:
  arti-net:
    name: arti-deployer_net
    external: true
