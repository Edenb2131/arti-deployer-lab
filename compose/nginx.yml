# Overlay: NGINX reverse proxy in front of Artifactory (HTTP only).
# Use compose/nginx-https.yml instead if you want HTTPS — the two are
# mutually exclusive (the CLI picks one based on the wizard's HTTPS toggle).
services:
  nginx:
    image: nginx:${NGINX_VERSION}
    container_name: arti-nginx
    restart: unless-stopped
    depends_on:
      artifactory1:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ../config/nginx/nginx-http.conf:/etc/nginx/nginx.conf:ro
    networks: [arti-net]

networks:
  arti-net:
    name: arti-deployer_net
