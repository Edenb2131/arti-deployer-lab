# NGINX reverse-proxy for Artifactory — HTTP only.
# Based on JFrog's recommended template for AF behind a reverse proxy.
# https://jfrog.com/help/r/jfrog-installation-setup-documentation/configure-nginx
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  # Artifact uploads can be huge — disable client body size limit
  client_max_body_size 0;
  client_body_buffer_size 32k;
  proxy_read_timeout 2400s;
  proxy_connect_timeout 75s;

  upstream artifactory1 {
    server artifactory1:8082 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80;
    server_name _;

    rewrite ^/artifactory/?(/webapp)?$ /ui/ redirect;
    chunked_transfer_encoding on;

    location / {
      proxy_pass_header   Server;
      proxy_cookie_path   ~*^/.* /;
      proxy_buffer_size   128k;
      proxy_buffers       40 128k;
      proxy_busy_buffers_size 256k;
      proxy_set_header    X-JFrog-Override-Base-Url $scheme://$host:$server_port;
      proxy_set_header    X-Forwarded-Port  $server_port;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_set_header    Host              $http_host;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_pass          http://artifactory1;
    }
  }
}
