# NGINX reverse-proxy for Artifactory — HTTPS with self-signed cert.
# Port 80 redirects to 443.
#
# Two vhosts so each AF gets its own browser-facing hostname:
#   https://art1.localtest.me:8443/  → artifactory1
#   https://art2.localtest.me:8443/  → artifactory2
#   https://localhost:8443/          → artifactory1 (default, back-compat)
#
# Different hostnames are essential for two-AF labs on localhost — RFC 6265
# doesn't scope cookies by port, so a SESSION cookie set by art1 would
# silently overwrite art2's (and vice versa), causing the "logged out every
# few seconds" symptom. localtest.me is a public DNS suffix that resolves
# any *.localtest.me to 127.0.0.1, so no /etc/hosts edit is needed.
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 0;
  client_body_buffer_size 32k;
  proxy_read_timeout 2400s;
  proxy_connect_timeout 75s;

  upstream artifactory1 {
    server artifactory1:8082 max_fails=3 fail_timeout=10s;
  }
  upstream artifactory2 {
    server artifactory2:8082 max_fails=3 fail_timeout=10s;
  }

  # HTTP → HTTPS redirect (all hostnames)
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host:$server_port$request_uri;
  }

  # Shared proxy settings — included via `include` directives would be
  # cleaner, but keeping inline so the config is self-contained.

  # ── art1 vhost (also the default for plain localhost) ──────────────────────
  server {
    listen 443 ssl default_server;
    http2 on;
    server_name art1.localtest.me localhost _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    rewrite ^/artifactory/?(/webapp)?$ /ui/ redirect;
    chunked_transfer_encoding on;

    location / {
      proxy_pass_header   Server;
      proxy_cookie_path   ~*^/.* /;
      proxy_buffer_size   128k;
      proxy_buffers       40 128k;
      proxy_busy_buffers_size 256k;
      proxy_set_header    X-JFrog-Override-Base-Url https://$host:$server_port;
      proxy_set_header    X-Forwarded-Port  $server_port;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_set_header    Host              $http_host;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_pass          http://artifactory1;
    }
  }

  # ── art2 vhost ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name art2.localtest.me;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    rewrite ^/artifactory/?(/webapp)?$ /ui/ redirect;
    chunked_transfer_encoding on;

    location / {
      proxy_pass_header   Server;
      proxy_cookie_path   ~*^/.* /;
      proxy_buffer_size   128k;
      proxy_buffers       40 128k;
      proxy_busy_buffers_size 256k;
      proxy_set_header    X-JFrog-Override-Base-Url https://$host:$server_port;
      proxy_set_header    X-Forwarded-Port  $server_port;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_set_header    Host              $http_host;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_pass          http://artifactory2;
    }
  }
}
