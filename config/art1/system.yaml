## Artifactory 1 — system.yaml
## Docs: https://jfrog.com/help/r/jfrog-installation-setup-documentation/system-yaml-file-descriptive
configVersion: 1

shared:
  node:
    id: art1
    name: art1
    ip: artifactory1
  database:
    type: postgresql
    driver: org.postgresql.Driver
    url: jdbc:postgresql://postgres-art1:5432/artifactory
    username: artifactory
    password: art1_dev_password
  # ⚠ DEV-ONLY shared secrets. Same value across art1, art2, and xray so the
  # services can join each other. Regenerate with `openssl rand -hex 16` if
  # you ever take this beyond localhost.
  security:
    joinKey: EEEE1111DDDD2222CCCC3333BBBB4444
    masterKey: FFFF0000EEEE1111DDDD2222CCCC3333
